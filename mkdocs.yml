site_name: Tharun Sebastian | Lab
site_url: https://tharun135.github.io
site_description: A public learning log — AI experiments, builds, and notes by Tharun Sebastian.

nav:
  - Home: index.md
  - Experiments:
      - experiments/index.md
      - Doc-Scanner: experiments/doc-scanner.md
      - RAG with ChromaDB: experiments/rag-chromadb.md
      - Doc Agent Orchestrator: experiments/documentation-agent-orchestrator.md
  - TIL: til/index.md
  - Now: now.md
  - Samples:
      - samples/index.md
      - API Reference Guide: samples/api-reference/index.md
      - End-User Manual: samples/user-manual/index.md
      - Release Notes: samples/release-notes/index.md
      - DocScanner: samples/doc-scanner/index.md
  - Projects: projects/index.md
  - Skills: skills/index.md
  - Writing: writing/index.md

theme:
  name: material
  custom_dir: overrides
  palette:
    # Palette toggle for day/night mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.tracking
    - navigation.instant
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - meta
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tasklist:
      clickable_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Tharun135
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/tharun-sebastian/
    - icon: fontawesome/solid/globe
      link: https://portfolio.tharun-sebastian.workers.dev/